name: uq-workshop
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy>=1.11
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3
  - jupyterlab>=4.0
  - ipykernel
  - tqdm
  - pillow

  # Deep Learning
  - pytorch>=2.1
  - torchvision>=0.16
  - cpuonly          # Remove this line if you have a GPU!

  - pip:
    - lightning>=2.2
    - lightning-uq-box>=0.2
    - torchgeo>=0.5
    - netcal>=1.3        # calibration metrics
    - einops
    - rich
    - ipywidgets
